name: expense_tracker_pro
description: A production-grade offline-first Expense Tracker with budgets, charts, CSV/PDF export, cloud sync, and local notifications.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management, DI, routing
  get: ^4.6.6
  get_storage: ^2.1.1

  # Offline-first local database
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Firebase (cloud sync + auth)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_crashlytics: ^4.1.3

  # Charts
  fl_chart: ^0.69.0

  # Export
  pdf: ^3.11.1
  printing: ^5.13.1
  csv: ^6.0.0
  share_plus: ^13.2.0
  path_provider: ^2.1.4

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  workmanager: ^0.5.2

  # UI
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  lottie: ^3.1.2
  intl: ^0.20.2

  # Utils
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.4.0
  uuid: ^4.5.1
  flutter_dotenv: ^5.2.1
  package_info_plus: ^10.2.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - .env
